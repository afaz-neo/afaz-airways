<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFAZ Airways | Above All</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy: #0a1628;
            --navy-light: #1a2a42;
            --gold: #c9a84c;
            --gold-light: #e0c87a;
            --white: #ffffff;
            --cream: #f5f0e8;
            --gray: #6b7280;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; color:var(--navy); }
        html { scroll-behavior:smooth; }

        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px 60px; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.4s ease;
        }
        .navbar.scrolled { background: rgba(10,22,40,0.95); backdrop-filter: blur(20px); padding: 15px 60px; }

        .logo { font-family:'Playfair Display',serif; font-size: 28px; font-weight: 700; color: white; text-decoration: none; }
        .logo span { color: var(--gold); }

        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; text-transform: uppercase; position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.3s; }
        .nav-links a:hover::after { width: 100%; }

        .hero {
            height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: linear-gradient(135deg, #0a1628, #1a2a42);
        }
        .hero-content { position: relative; z-index: 2; text-align: center; color: white; max-width: 900px; padding: 0 20px; }
        .hero-title { font-family:'Playfair Display',serif; font-size: clamp(48px, 8vw, 80px); font-weight: 700; margin-bottom: 24px; }
        .hero-title span { color: var(--gold); }

        .booking-widget {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 30px 40px; display: flex; gap: 20px; align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 1100px; width: 90%; z-index: 10;
        }

        .btn {
            padding: 12px 28px; border-radius: 30px; font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .btn-primary { background: var(--gold); color: var(--navy); }
        .btn-outline { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.4); }

        .section { padding: 100px 60px; }
        .destinations { background: var(--cream); }
        .section-title { font-family:'Playfair Display',serif; font-size: clamp(32px,5vw,48px); font-weight:700; text-align:center; margin-bottom:60px; }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="#" class="logo">AFAZ <span>AIRWAYS</span></a>
        <ul class="nav-links">
            <li><a href="#destinations">Destinations</a></li>
            <li><a href="#experience">Experience</a></li>
            <li><a href="#fleet">Fleet</a></li>
        </ul>
        <div>
            <a href="#" class="btn btn-outline">Login</a>
            <a href="#" class="btn btn-primary">Book Now</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div style="letter-spacing:4px; color:#c9a84c; margin-bottom:20px;">ABOVE ALL</div>
            <h1 class="hero-title">Fly with <span>Excellence</span></h1>
            <p style="font-size:18px; max-width:600px; margin:0 auto 40px;">Nigeria’s premium airline delivering world-class comfort and service.</p>
            <div style="display:flex; gap:20px; justify-content:center;">
                <a href="#destinations" class="btn btn-primary">Explore Destinations</a>
            </div>
        </div>

        <div class="booking-widget">
            <input type="text" value="Lagos (LOS)" style="padding:12px; border-radius:10px; border:2px solid #ddd;">
            <input type="text" placeholder="To" style="padding:12px; border-radius:10px; border:2px solid #ddd;">
            <input type="date" style="padding:12px; border-radius:10px; border:2px solid #ddd;">
            <button class="btn btn-primary" style="padding:15px 35px;">Search</button>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });
    </script>
</body>
</html>
